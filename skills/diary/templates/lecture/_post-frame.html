<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{POST_TITLE}} — {{BLOG_TITLE}}</title>
<link rel="stylesheet" href="../assets/style.css" />
<style>
  .lec-article { max-width: 820px; margin: 0 auto; padding: 56px 32px 96px; }
  .lec-article .meta { font-size: 12px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; }
  .lec-article h1 { font-family: var(--serif); font-size: clamp(28px, 4.5vw, 42px); line-height: 1.2; letter-spacing: -0.8px; margin-bottom: 18px; }
  .lec-article .body { font-size: 16.5px; line-height: 1.8; }
  .lec-article .body h2 { font-family: var(--serif); margin: 36px 0 14px; font-size: 24px; }
  .lec-article .body h3 { margin: 28px 0 10px; font-size: 19px; }
  .lec-article .body p { margin: 14px 0; }
  .lec-article .body code { background: var(--accent-soft); padding: 2px 6px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: 0.92em; color: var(--accent); }
  .lec-article .body pre { background: var(--bg-card); border: 1px solid var(--border); padding: 16px; border-radius: 8px; overflow-x: auto; }
  .lec-article .body pre code { background: transparent; color: inherit; padding: 0; }
  .lec-article .body blockquote { border-left: 4px solid var(--accent); padding: 4px 16px; color: var(--muted); margin: 16px 0; }
  .back { font-size: 13px; color: var(--muted); display: inline-block; margin-bottom: 12px; }
</style>
<script>(function(){ try { var t = localStorage.getItem('blog-theme') || 'light'; document.documentElement.setAttribute('data-theme', t); } catch(e){} })();</script>
</head>
<body>
<article class="lec-article">
  <a class="back" href="../index.html">← {{BLOG_TITLE}}</a>
  <div class="meta">{{POST_CATEGORY}} · <time>{{POST_DATE}}</time></div>
  <h1>{{POST_TITLE}}</h1>
  <div class="body">
{{POST_HTML}}
  </div>
  {{COMMENTS_BLOCK}}
</article>
</body>
</html>
