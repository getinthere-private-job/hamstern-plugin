<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{BLOG_TITLE}}</title>
<meta name="description" content="{{BLOG_TAGLINE}}" />
<link rel="stylesheet" href="assets/style.css" />
<script>(function(){ try { var t = localStorage.getItem('blog-theme') || 'light'; document.documentElement.setAttribute('data-theme', t); } catch(e){} })();</script>
</head>
<body>
  <header class="topbar">
    <a class="logo" href="./"><span class="logo__sigil">講</span> {{BLOG_TITLE}}</a>
    <nav class="topnav">
      <a href="#syllabus">강의 목차</a>
      <button id="theme-toggle" class="theme-toggle" type="button">◐</button>
    </nav>
  </header>

  <section class="cover">
    <div class="cover__inner">
      <p class="cover__eyebrow">LECTURE NOTES</p>
      <h1 class="cover__title">{{BLOG_HERO_TITLE}}</h1>
      <p class="cover__lede">{{BLOG_TAGLINE}}</p>
    </div>
  </section>

  <main class="syllabus" id="syllabus">
    <h2 class="syllabus__title">강의 목차</h2>
    {{SEARCH_BLOCK}}
    <div id="lecture-groups"></div>
  </main>

  <footer class="footer"><span>© {{BLOG_YEAR}} {{BLOG_TITLE}}</span></footer>
  <script src="assets/script.js"></script>
</body>
</html>
