<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{POST_TITLE}} — {{BLOG_TITLE}}</title>
<link rel="stylesheet" href="../assets/style.css" />
<style>
  .post-article { max-width: 760px; margin: 0 auto; padding: 56px 24px 96px; }
  .post-article header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .post-article h1.post-title { font-size: clamp(26px, 4vw, 38px); font-weight: 800; letter-spacing: -1px; line-height: 1.25; margin-bottom: 14px; }
  .post-article .post-meta { display: flex; gap: 12px; align-items: center; font-size: 13px; color: var(--text-muted); }
  .post-article .post-content { font-size: 16px; line-height: 1.8; color: var(--text); }
  .post-article .post-content h2 { font-size: 24px; margin: 36px 0 14px; letter-spacing: -0.4px; }
  .post-article .post-content h3 { font-size: 19px; margin: 28px 0 10px; }
  .post-article .post-content p { margin: 14px 0; }
  .post-article .post-content code { background: var(--bg-soft); padding: 2px 6px; border-radius: 4px; font-size: 0.92em; }
  .post-article .post-content pre { background: var(--bg-soft); padding: 16px; border-radius: 10px; overflow-x: auto; margin: 16px 0; }
  .post-article .post-content pre code { background: transparent; padding: 0; }
  .post-article .post-content blockquote { border-left: 4px solid var(--accent); padding: 4px 18px; color: var(--text-muted); margin: 18px 0; }
  .post-article .post-content ul, .post-article .post-content ol { padding-left: 24px; margin: 12px 0; }
  .post-article .post-content li { margin: 6px 0; }
  .post-article .post-content table { border-collapse: collapse; margin: 16px 0; width: 100%; }
  .post-article .post-content th, .post-article .post-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .post-article .post-content a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .post-article .post-content img { max-width: 100%; border-radius: 8px; }
</style>
<script>
  (function(){ try { var t = localStorage.getItem('blog-theme') || 'dark'; document.documentElement.setAttribute('data-theme', t); } catch(e){} })();
</script>
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-brand" href="../index.html">
        <span class="site-brand__logo">◆</span>
        <span class="site-brand__name">{{BLOG_TITLE}}</span>
      </a>
      <nav class="site-nav">
        <a href="../index.html">Posts</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">
          <span class="theme-toggle__icon theme-toggle__icon--sun">☀</span>
          <span class="theme-toggle__icon theme-toggle__icon--moon">☾</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <article class="post-article">
      <header>
        <span class="post-card__category">{{POST_CATEGORY}}</span>
        <h1 class="post-title">{{POST_TITLE}}</h1>
        <div class="post-meta">
          <time>{{POST_DATE}}</time>
        </div>
      </header>
      <div class="post-content">
{{POST_HTML}}
      </div>
    </article>
  </main>

  <script>
    (function(){
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function(){
        var cur = document.documentElement.getAttribute('data-theme') || 'dark';
        var next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('blog-theme', next); } catch(e){}
      });
    })();
  </script>
</body>
</html>
