<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{BLOG_TITLE}}</title>
<link rel="stylesheet" href="assets/style.css" />
<script>(function(){ try { var t = localStorage.getItem('blog-theme') || 'light'; document.documentElement.setAttribute('data-theme', t); } catch(e){} })();</script>
</head>
<body class="nb-layout">
  <aside class="nb-sidebar">
    <a class="nb-brand" href="./">{{BLOG_TITLE}}</a>
    <p class="nb-tagline">{{BLOG_TAGLINE}}</p>
    <hr />
    <div class="nb-toc">
      <h3>NOTEBOOKS</h3>
      <ul id="toc-list"></ul>
    </div>
    <button id="theme-toggle" class="nb-theme" type="button">◐ Theme</button>
  </aside>
  <main class="nb-main">
    <div class="nb-cell nb-cell--md">
      <h1># {{BLOG_HERO_TITLE}}</h1>
      <p>{{BLOG_TAGLINE}}</p>
    </div>
    <div id="posts-list"></div>
  </main>
  <script src="assets/script.js"></script>
</body>
</html>
