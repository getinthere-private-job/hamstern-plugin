<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{POST_TITLE}} — {{BLOG_TITLE}}</title>
<link rel="stylesheet" href="../assets/style.css" />
<style>
  .mag-article { max-width: 760px; margin: 0 auto; padding: 56px 32px 96px; }
  .mag-article .back { font-family: var(--sans); font-size: 12px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; display: inline-block; margin-bottom: 18px; }
  .mag-article .cat { font-size: 12px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-weight: 700; margin-bottom: 14px; }
  .mag-article h1 { font-family: var(--serif); font-size: clamp(32px, 5vw, 52px); line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 16px; }
  .mag-article .meta { font-family: var(--sans); font-size: 13px; color: var(--muted); margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .mag-article .body { font-family: var(--serif); font-size: 19px; line-height: 1.8; }
  .mag-article .body h2 { font-size: 28px; margin: 36px 0 14px; letter-spacing: -0.4px; }
  .mag-article .body h3 { font-size: 22px; margin: 28px 0 10px; }
  .mag-article .body p { margin: 14px 0; }
  .mag-article .body p:first-of-type::first-letter { font-size: 56px; font-weight: 700; float: left; line-height: 0.9; padding: 4px 8px 0 0; color: var(--accent); }
  .mag-article .body code { font-family: ui-monospace, monospace; background: var(--bg-card); padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
  .mag-article .body pre { font-family: ui-monospace, monospace; background: var(--bg-card); padding: 16px; border-radius: 0; overflow-x: auto; border-left: 4px solid var(--accent); font-size: 14px; }
  .mag-article .body pre code { background: transparent; padding: 0; }
  .mag-article .body blockquote { font-style: italic; font-size: 22px; color: var(--accent); margin: 24px 0; padding-left: 0; border: 0; border-top: 2px solid var(--accent); border-bottom: 1px solid var(--border); padding: 18px 0; }
</style>
<script>(function(){ try { var t = localStorage.getItem('blog-theme') || 'light'; document.documentElement.setAttribute('data-theme', t); } catch(e){} })();</script>
</head>
<body>
<article class="mag-article">
  <a class="back" href="../index.html">← {{BLOG_TITLE}}</a>
  <div class="cat">{{POST_CATEGORY}}</div>
  <h1>{{POST_TITLE}}</h1>
  <div class="meta"><time>{{POST_DATE}}</time></div>
  <div class="body">
{{POST_HTML}}
  </div>
</article>
</body>
</html>
