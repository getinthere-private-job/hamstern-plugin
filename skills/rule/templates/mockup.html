<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rule: {{title}}</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
h2 { margin-top: 32px; }
.example { border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin: 12px 0; }
.bad { border-color: #c33; background: #fdd; }
.good { border-color: #393; background: #dfd; }
.label { font-weight: bold; margin-bottom: 8px; }
/* Caller MUST escape any "</style>" sequences in custom_css to avoid breaking out of the style block. */
{{custom_css}}
</style>
</head>
<body>
<h1>{{title}}</h1>
<p><strong>원칙:</strong> {{principle}}</p>

<h2>✅ 올바른 패턴</h2>
<div class="example good">
<div class="label">올바른 예시</div>
{{good_html}}
</div>

<h2>❌ 잘못된 패턴</h2>
<div class="example bad">
<div class="label">잘못된 예시</div>
{{bad_html}}
</div>
</body>
</html>
